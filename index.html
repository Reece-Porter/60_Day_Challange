<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock-In Tracker → Aug 12</title>
<style>
  :root{--paper:#F7F6F2;--card:#FFFFFF;--ink:#1B1B1A;--muted:#6F6E69;
    --line:#E5E3DC;--done:#2E7D54;--btn-bg:#1B1B1A;--btn-text:#FFFFFF;--box-empty:#C9C7BF;}
  body.dark{--paper:#15151A;--card:#1E1E24;--ink:#ECEAE3;--muted:#9C9A91;
    --line:#34343C;--done:#4CAF7D;--btn-bg:#ECEAE3;--btn-text:#15151A;--box-empty:#4A4A52;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.45;padding:18px 14px 60px;max-width:560px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .theme-btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:99px;padding:6px 12px;cursor:pointer;}
  body{transition:background .25s ease,color .25s ease;}
  header{margin-bottom:14px;}
  .count-wrap{display:flex;align-items:baseline;gap:10px;margin-top:4px;}
  .count{font-size:54px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .count-label{font-size:14px;color:var(--muted);font-weight:500;}
  .progress-track{height:8px;background:var(--line);border-radius:99px;margin-top:14px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--done);width:0;transition:width .35s ease;}
  .progress-text{font-size:12px;color:var(--muted);margin-top:6px;}
  /* day nav */
  .nav{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .nav button{flex:0 0 auto;font-size:18px;font-weight:700;width:42px;height:42px;border-radius:11px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;}
  .nav button:disabled{opacity:.3;cursor:default;}
  .nav-mid{flex:1;text-align:center;}
  .nav-day{font-size:15px;font-weight:700;}
  .nav-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px;}
  .card h2{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px;}
  .card h2 .badge{float:right;color:var(--done);letter-spacing:0;font-size:12px;}
  /* compare */
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cmp-cell{display:flex;flex-direction:column;}
  .cmp-img{aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:var(--paper);
    border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;}
  .cmp-img img{width:100%;height:100%;object-fit:cover;}
  .cmp-img .ph{font-size:12px;color:var(--muted);text-align:center;padding:8px;}
  .cmp-cap{font-size:12px;font-weight:700;margin-top:6px;text-align:center;}
  .cmp-cap span{display:block;font-weight:500;color:var(--muted);font-size:11px;}
  .photo-btn{margin-top:12px;width:100%;font-family:inherit;font-size:14px;font-weight:700;color:var(--btn-text);
    background:var(--btn-bg);border:none;border-radius:10px;padding:11px;cursor:pointer;}
  /* items */
  .item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--line);cursor:pointer;}
  .item:first-of-type{border-top:none;}
  .box{flex:0 0 22px;height:22px;width:22px;border:2px solid var(--box-empty);border-radius:6px;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;}
  .box svg{width:13px;height:13px;opacity:0;transform:scale(.6);transition:all .15s ease;}
  .item.done .box{background:var(--done);border-color:var(--done);}
  .item.done .box svg{opacity:1;transform:scale(1);}
  .item-text{flex:1;} .item-text .t{font-size:15px;font-weight:600;}
  .item-text .s{font-size:13px;color:var(--muted);margin-top:1px;}
  .item.done .item-text .t{text-decoration:line-through;color:var(--muted);}
  .seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:99px;padding:8px 13px;cursor:pointer;transition:all .15s ease;}
  .seg button.active{background:var(--btn-bg);color:var(--btn-text);border-color:var(--btn-bg);}
  .seg-hint{font-size:12px;color:var(--muted);margin:2px 0 14px;}
  .ref-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:14px;}
  .ref-row:first-of-type{border-top:none;}
  .ref-row span:first-child{color:var(--muted);} .ref-row span:last-child{font-weight:700;}
  .food-label{font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  textarea{width:100%;font-family:inherit;font-size:14px;line-height:1.5;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:10px;padding:11px;min-height:96px;resize:vertical;}
  .w-entry{display:flex;gap:8px;margin-bottom:14px;}
  .w-entry input{flex:1;font-family:inherit;font-size:16px;font-weight:600;padding:10px 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);}
  .w-entry button{font-family:inherit;font-size:14px;font-weight:700;color:var(--btn-text);background:var(--btn-bg);
    border:none;border-radius:10px;padding:10px 16px;cursor:pointer;}
  .w-stats{display:flex;gap:10px;margin-bottom:12px;}
  .w-stat{flex:1;background:var(--paper);border-radius:10px;padding:10px;text-align:center;}
  .w-stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .w-stat .v{font-size:18px;font-weight:800;margin-top:3px;} .w-stat .v.down{color:var(--done);}
  .spark{width:100%;height:46px;display:block;} .w-empty{font-size:13px;color:var(--muted);}
  .week{display:flex;gap:6px;justify-content:space-between;margin-top:4px;}
  .day{flex:1;text-align:center;cursor:pointer;}
  .day .dl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .day .dn{font-size:10px;color:var(--muted);margin-top:1px;}
  .day .dot{width:26px;height:26px;border-radius:50%;margin:5px auto 0;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);}
  .day.full .dot{background:var(--done);border-color:var(--done);color:#fff;}
  .day.part .dot{border-color:var(--done);color:var(--done);}
  .day.is-view .dl{color:var(--ink);font-weight:800;} .day.is-view .dot{box-shadow:0 0 0 2px var(--ink);}
  .reset{margin-top:18px;width:100%;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer;}
  .note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.55;}
  .loading{text-align:center;color:var(--muted);padding:30px;font-size:14px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>
<header>
  <div class="top"><div class="eyebrow">Lock-in · recomp</div><button class="theme-btn" id="themeBtn">🌙 Dark</button></div>
  <div class="count-wrap"><span class="count" id="count">–</span><span class="count-label">days left<br>to Aug 12</span></div>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
  <div class="progress-text" id="progText">Loading…</div>
  <div class="nav">
    <button id="prevDay">◀</button>
    <div class="nav-mid"><div class="nav-day" id="navDay"></div><div class="nav-sub" id="navSub"></div></div>
    <button id="nextDay">▶</button>
  </div>
</header>

<div id="app" class="loading">Loading…</div>
<input type="file" accept="image/*" id="photoInput" style="display:none">

<script>
const START=new Date(2026,5,11), TARGET=new Date(2026,7,12), KEY="recomp:";
const DAILY=[
  {id:"protein",t:"Protein 155–165g",s:"~30–40g across 4 meals"},
  {id:"cals",t:"Calories ~2,300–2,400",s:"small deficit — hold the muscle"},
  {id:"steps",t:"8,000–10,000 steps",s:"the quiet fat-loss lever"},
  {id:"sleep",t:"7–9 hours sleep",s:"where the muscle is actually built"},
  {id:"water",t:"Water 2–3L",s:""},
];
const SESSIONS={
  chestback:{label:"Chest / Back",items:[
    {id:"bench",t:"Bench press 4×6–10",s:""},{id:"incline",t:"Incline DB press 3×8–12",s:""},
    {id:"row",t:"Barbell / cable row 4×8–10",s:""},{id:"pull",t:"Lat pulldown 3×10–12",s:""},
    {id:"fly",t:"Chest fly 3×12–15",s:""},{id:"face",t:"Face pull 3×15",s:""}]},
  shoulderarms:{label:"Shoulders + Arms",items:[
    {id:"ohp",t:"Overhead press 4×6–10",s:""},{id:"lat",t:"Lateral raise 4×12–15",s:""},
    {id:"rear",t:"Rear delt fly 3×15",s:""},{id:"curl",t:"Barbell / EZ curl 3×8–12",s:""},
    {id:"push",t:"Triceps pushdown 3×10–12",s:""},{id:"ham",t:"Hammer curl 3×12",s:""},
    {id:"ohtri",t:"Overhead triceps ext 3×12",s:""}]},
  upper:{label:"Upper",items:[
    {id:"ubench",t:"Bench / chest press 3–4×6–10",s:""},{id:"urow",t:"Row 3–4×8–10",s:""},
    {id:"uohp",t:"Overhead press 3×8–10",s:""},{id:"upull",t:"Pull-up / lat pulldown 3×8–10",s:""},
    {id:"uarms",t:"Curl + pushdown 2×12 each",s:""}]},
  rest:{label:"Rest / cardio",items:[
    {id:"cardio",t:"15–20 min cardio (optional)",s:"incline walk or easy intervals"},
    {id:"recover",t:"Easy movement + recover",s:"rest days build the gains"}]},
};
const SUGGEST={1:"chestback",2:"rest",3:"shoulderarms",4:"rest",5:"upper",6:"rest",0:"rest"};
const ABS=[
  {id:"ab_leg",t:"Lying leg raises 3×12–15",s:"lower abs"},
  {id:"ab_rev",t:"Reverse crunch 3×15",s:"lower abs"},
  {id:"ab_crunch",t:"Crunch — hug a backpack/bottle 3×20",s:"upper abs, add load to grow"},
  {id:"ab_bike",t:"Bicycle crunch 3×20",s:"obliques"},
  {id:"ab_plank",t:"Plank 3×40–60s",s:"deep core / bracing"},
  {id:"ab_side",t:"Side plank 3×30s per side",s:"obliques"},
];
const ABS_IDS=ABS.map(a=>a.id);

const realToday=new Date(); const realKey=dkey(realToday);
const day1Key=dkey(START);
const earliest=(midnight(realToday)<START)?midnight(realToday):START;
let viewDate=new Date(realToday);
let viewKey=dkey(viewDate);
let dayState={session:null,checked:{},food:""};
let weights={}, photoCache={};

function dkey(d){return d.toISOString().slice(0,10);}
function midnight(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function pretty(d){return d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});}
function shortD(d){return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});}
function daysLeft(){return Math.max(0,Math.ceil((TARGET-midnight(realToday))/86400000));}
function progDayOf(d){return Math.floor((midnight(d)-START)/86400000)+1;}
function weekIndexOf(d){return Math.max(0,Math.floor((midnight(d)-START)/(7*86400000)));}

// --- Persistent storage via the browser's own IndexedDB (works on GitHub Pages etc.) ---
const DB_NAME="recompTrackerDB", STORE="kv"; let _dbP=null;
function openDB(){
  if(_dbP)return _dbP;
  _dbP=new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE);};
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
  return _dbP;
}
async function idbGet(k){const db=await openDB();return new Promise(res=>{const rq=db.transaction(STORE,"readonly").objectStore(STORE).get(k);rq.onsuccess=()=>res(rq.result===undefined?null:rq.result);rq.onerror=()=>res(null);});}
async function idbSet(k,v){const db=await openDB();return new Promise(res=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(v,k);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}

async function load(k){try{const v=await idbGet(KEY+k);return v?JSON.parse(v):null;}catch(e){return null;}}
async function save(k,v){try{await idbSet(KEY+k,JSON.stringify(v));}catch(e){console.error("save failed",e);}}

function barTotal(){return DAILY.length+(dayState.session?SESSIONS[dayState.session].items.length:0);}
function barDone(){let ids=DAILY.map(d=>d.id);if(dayState.session)ids=ids.concat(SESSIONS[dayState.session].items.map(i=>i.id));return ids.filter(id=>dayState.checked[id]).length;}

function render(){
  document.getElementById("count").textContent=daysLeft();
  const total=barTotal(),done=barDone(),pct=total?Math.round(done/total*100):0;
  document.getElementById("progFill").style.width=pct+"%";
  document.getElementById("progText").textContent=(done===total&&total>0)?"Done — locked in. ✓":done+" of "+total+" done";

  document.getElementById("navDay").textContent=pretty(viewDate);
  const pd=progDayOf(viewDate);
  let sub=(viewKey===realKey?"Today · ":"")+(pd<1?"before start":"Day "+pd+" · Week "+(weekIndexOf(viewDate)+1));
  document.getElementById("navSub").textContent=sub;
  document.getElementById("prevDay").disabled=(viewKey<=dkey(earliest));
  document.getElementById("nextDay").disabled=(viewKey>=realKey);

  const keys=["chestback","shoulderarms","upper","rest"];
  let seg='<div class="seg">'+keys.map(k=>`<button class="${dayState.session===k?'active':''}" data-sess="${k}">${SESSIONS[k].label}</button>`).join('')+'</div>';
  seg+=`<div class="seg-hint">${dayState.session?'Tap any to switch':'Suggested: '+SESSIONS[SUGGEST[viewDate.getDay()]].label+' — tap to load'}</div>`;
  const train=dayState.session?SESSIONS[dayState.session].items.map(itemHtml).join(''):'';
  const absToday=ABS_IDS.some(id=>dayState.checked[id]);
  const cmpLabel=viewKey===realKey?"Today":shortD(viewDate);
  const photoLabel=viewKey===day1Key?"Add / change Day 1 photo":(viewKey===realKey?"Add / change today's photo":"Add / change this day's photo");

  const app=document.getElementById("app"); app.className="";
  app.innerHTML=`
    <div class="card">
      <h2>Progress · Day 1 vs ${cmpLabel}</h2>
      <div class="cmp">
        <div class="cmp-cell"><div class="cmp-img" id="img1"><span class="ph">No Day 1 photo yet</span></div>
          <div class="cmp-cap">Day 1<span>11 Jun</span></div></div>
        <div class="cmp-cell"><div class="cmp-img" id="img2"><span class="ph">No photo</span></div>
          <div class="cmp-cap">${cmpLabel}<span>${pd<1?'before start':'Day '+pd}</span></div></div>
      </div>
      <button class="photo-btn" id="photoBtn">${photoLabel}</button>
    </div>

    <div class="card"><h2>Every day · non-negotiables</h2>${DAILY.map(itemHtml).join('')}</div>

    <div class="card"><h2>Gym — session</h2>${seg}${train}</div>

    <div class="card">
      <h2>Abs at home<span class="badge" id="absBadge">${absToday?'✓ today':''}</span></h2>
      <div class="seg-hint" style="margin-top:-4px">Do this 3–4×/week — floor only, no equipment.</div>
      ${ABS.map(itemHtml).join('')}
    </div>

    <div class="card">
      <h2>Macros — keep handy</h2>
      <div class="ref-row"><span>Calories</span><span>2,300–2,400</span></div>
      <div class="ref-row"><span>Protein</span><span>155–165g</span></div>
      <div class="ref-row"><span>Fat</span><span>65–75g</span></div>
      <div class="ref-row"><span>Carbs</span><span>250–275g</span></div>
      <div class="food-label">What I ate today</div>
      <textarea id="food" placeholder="Breakfast… lunch… dinner… snacks…"></textarea>
    </div>

    <div class="card">
      <h2>Weight</h2>
      <div class="w-entry"><input id="wInput" type="number" inputmode="decimal" step="0.1" placeholder="Weight on this day, kg"><button id="wLog">Log</button></div>
      <div id="wBody"></div>
    </div>

    <div class="card"><h2>This week<span class="badge" id="weekAbs"></span></h2><div class="week" id="week"></div></div>

    <button class="reset" id="resetBtn">Reset this day's ticks</button>
    <p class="note">Everything saves automatically per day — flick ◀ ▶ to revisit any day or tap a date below. Snap your photo in the same spot/lighting each time for a true comparison. Weigh in 2–3×/week; drop ~100 kcal if the trend stalls two weeks. Trust the trend + photos over any single morning.</p>
  `;

  app.querySelectorAll(".item").forEach(el=>el.addEventListener("click",()=>toggle(el.dataset.id)));
  app.querySelectorAll(".seg button").forEach(el=>el.addEventListener("click",()=>pickSession(el.dataset.sess)));
  document.getElementById("resetBtn").addEventListener("click",resetDay);
  document.getElementById("wLog").addEventListener("click",logWeight);
  document.getElementById("photoBtn").addEventListener("click",()=>document.getElementById("photoInput").click());
  const wi=document.getElementById("wInput"); if(weights[viewKey]!=null)wi.value=weights[viewKey];
  const fa=document.getElementById("food"); fa.value=dayState.food||"";
  fa.addEventListener("input",e=>{dayState.food=e.target.value;persistDay();});

  renderPhotos(); renderWeight(); renderWeek();
}

function itemHtml(it){const on=!!dayState.checked[it.id];
  return `<div class="item ${on?'done':''}" data-id="${it.id}">
    <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="item-text"><div class="t">${it.t}</div>${it.s?`<div class="s">${it.s}</div>`:''}</div></div>`;}

async function ensurePhoto(k){if(photoCache[k]!==undefined)return;const r=await load("photo:"+k);photoCache[k]=r||null;}
async function renderPhotos(){
  await ensurePhoto(day1Key); await ensurePhoto(viewKey);
  const c1=document.getElementById("img1"), c2=document.getElementById("img2");
  if(c1)c1.innerHTML=photoCache[day1Key]?`<img src="${photoCache[day1Key]}">`:'<span class="ph">No Day 1 photo yet</span>';
  if(c2)c2.innerHTML=photoCache[viewKey]?`<img src="${photoCache[viewKey]}">`:'<span class="ph">No photo — tap below</span>';
}

function handlePhoto(file){
  const reader=new FileReader();
  reader.onload=e=>{const img=new Image();
    img.onload=()=>{const max=800;let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const data=cv.toDataURL("image/jpeg",0.7);
      photoCache[viewKey]=data; save("photo:"+viewKey,data); renderPhotos();};
    img.src=e.target.result;};
  reader.readAsDataURL(file);
}

function renderWeight(){
  const body=document.getElementById("wBody"); if(!body)return;
  const entries=Object.entries(weights).sort((a,b)=>a[0]<b[0]?-1:1);
  if(entries.length===0){body.innerHTML='<div class="w-empty">Log your weight to set your start point and trend.</div>';return;}
  const start=entries[0][1],latest=entries[entries.length-1][1],diff=+(latest-start).toFixed(1);
  const cls=diff<0?'down':'',sign=diff>0?'+':'';
  let html=`<div class="w-stats">
    <div class="w-stat"><div class="l">Start</div><div class="v">${start}</div></div>
    <div class="w-stat"><div class="l">Now</div><div class="v">${latest}</div></div>
    <div class="w-stat"><div class="l">Change</div><div class="v ${cls}">${sign}${diff} kg</div></div></div>`;
  if(entries.length>=2){const vals=entries.map(e=>e[1]),mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;
    const pts=vals.map((v,i)=>((i/(entries.length-1))*100).toFixed(1)+","+(40-((v-mn)/rng)*36-2).toFixed(1)).join(" ");
    html+=`<svg class="spark" viewBox="0 0 100 44" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#2E7D54" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }else html+='<div class="w-empty">One more entry and your trend line appears.</div>';
  body.innerHTML=html;
}

async function renderWeek(){
  const wk=document.getElementById("week"); if(!wk)return;
  const wkStart=new Date(START); wkStart.setDate(START.getDate()+weekIndexOf(viewDate)*7);
  const labels=["S","M","T","W","T","F","S"]; let html="",absCount=0;
  for(let i=0;i<7;i++){const d=new Date(wkStart);d.setDate(wkStart.getDate()+i);const k=dkey(d);
    let cls="day",mark="";if(k===viewKey)cls+=" is-view";
    const data=k===viewKey?dayState:await load(k);
    if(data&&data.checked){const dc=DAILY.filter(x=>data.checked[x.id]).length;
      if(dc>=DAILY.length){cls+=" full";mark="✓";}else if(dc>0){cls+=" part";mark=dc;}
      if(ABS_IDS.some(id=>data.checked[id]))absCount++;}
    html+=`<div class="${cls}" data-key="${k}"><div class="dl">${labels[d.getDay()]}</div><div class="dn">${d.getDate()}</div><div class="dot">${mark}</div></div>`;}
  wk.innerHTML=html;
  wk.querySelectorAll(".day").forEach(el=>el.addEventListener("click",()=>jumpTo(el.dataset.key)));
  const wa=document.getElementById("weekAbs"); if(wa)wa.textContent="abs "+absCount+"/4";
}

function toggle(id){dayState.checked[id]=!dayState.checked[id];persistDay();render();}
function pickSession(k){
  if(dayState.session!==k){const keep={};
    DAILY.forEach(d=>{if(dayState.checked[d.id])keep[d.id]=true;});
    ABS_IDS.forEach(id=>{if(dayState.checked[id])keep[id]=true;});
    SESSIONS[k].items.forEach(it=>{if(dayState.checked[it.id])keep[it.id]=true;});
    dayState.checked=keep;dayState.session=k;}
  persistDay();render();}
function resetDay(){dayState={session:dayState.session,checked:{},food:dayState.food};persistDay();render();}
function persistDay(){save(viewKey,dayState);}
function logWeight(){const inp=document.getElementById("wInput");const v=parseFloat(inp.value);
  if(isNaN(v)||v<=0)return;weights[viewKey]=Math.round(v*10)/10;save("weights",weights);renderWeight();}

async function changeDay(delta){
  const d=new Date(viewDate);d.setDate(d.getDate()+delta);
  if(midnight(d)<midnight(earliest)||midnight(d)>midnight(realToday))return;
  viewDate=d;viewKey=dkey(viewDate);await loadDay();render();}
async function jumpTo(k){
  if(k<dkey(earliest)||k>realKey)return;
  viewDate=new Date(k+"T00:00:00");viewKey=k;await loadDay();render();}
async function loadDay(){const s=await load(viewKey);dayState=s||{session:null,checked:{},food:""};if(dayState.food===undefined)dayState.food="";}

document.getElementById("prevDay").addEventListener("click",()=>changeDay(-1));
document.getElementById("nextDay").addEventListener("click",()=>changeDay(1));
document.getElementById("photoInput").addEventListener("change",e=>{if(e.target.files&&e.target.files[0])handlePhoto(e.target.files[0]);e.target.value="";});

const themeBtn=document.getElementById("themeBtn");
function applyTheme(dark){document.body.classList.toggle("dark",dark);themeBtn.textContent=dark?"☀️ Light":"🌙 Dark";}
themeBtn.addEventListener("click",()=>{const dark=!document.body.classList.contains("dark");applyTheme(dark);save("theme",dark?"dark":"light");});

(async function init(){
  const t=await load("theme"); applyTheme(t==="dark");
  const w=await load("weights"); weights=w||{};
  await loadDay(); render();
})();
</script>
</body>
