<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock-In Tracker → Aug 12</title>
<style>
  :root{--paper:#F7F6F2;--card:#FFFFFF;--ink:#1B1B1A;--muted:#6F6E69;
    --line:#E5E3DC;--done:#2E7D54;--btn-bg:#1B1B1A;--btn-text:#FFFFFF;--box-empty:#C9C7BF;
    --xp:#7C3AED;--xp-light:#EDE9FE;--water:#0EA5E9;--accent-raw:46,125,84;}
  body.dark{--paper:#15151A;--card:#1E1E24;--ink:#ECEAE3;--muted:#9C9A91;
    --line:#34343C;--done:#4CAF7D;--btn-bg:#ECEAE3;--btn-text:#15151A;--box-empty:#4A4A52;
    --xp:#A78BFA;--xp-light:#2D1F4F;--water:#38BDF8;}
  /* ── Colour themes ── */
  body.ct-ocean{--paper:#F0F7FF;--card:#FFFFFF;--line:#DAEAF7;--done:#0369A1;--box-empty:#BAD5EC;--xp:#0E7490;--xp-light:#CFFAFE;--accent-raw:3,105,161;}
  body.ct-ocean.dark{--paper:#0C1A2E;--card:#102240;--line:#1A3558;--done:#38BDF8;--box-empty:#1E4068;--xp:#22D3EE;--xp-light:#0C3052;}
  body.ct-sunset{--paper:#FFF7F0;--card:#FFFFFF;--line:#F5DFD0;--done:#C2410C;--box-empty:#E8C4A8;--xp:#B45309;--xp-light:#FEF3C7;--accent-raw:194,65,12;}
  body.ct-sunset.dark{--paper:#1A0E06;--card:#2A1508;--line:#3D2010;--done:#FB923C;--box-empty:#4A2A10;--xp:#FCD34D;--xp-light:#2A1800;}
  body.ct-violet{--paper:#F5F3FF;--card:#FFFFFF;--line:#E0D9FF;--done:#6D28D9;--box-empty:#C4B8F0;--xp:#7C3AED;--xp-light:#EDE9FE;--accent-raw:109,40,217;}
  body.ct-violet.dark{--paper:#12062A;--card:#1C0F3A;--line:#2D1A55;--done:#A78BFA;--box-empty:#3D2070;--xp:#C4B5FD;--xp-light:#1E0D40;}
  body.ct-rose{--paper:#FFF1F5;--card:#FFFFFF;--line:#F8D0DE;--done:#BE185D;--box-empty:#F0A0BF;--xp:#9D174D;--xp-light:#FCE7F3;--accent-raw:190,24,93;}
  body.ct-rose.dark{--paper:#1A0610;--card:#2A0A1A;--line:#3D1028;--done:#F472B6;--box-empty:#501030;--xp:#F9A8D4;--xp-light:#280A18;}
  body.ct-gold{--paper:#FFFBF0;--card:#FFFFFF;--line:#F0E5C8;--done:#92400E;--box-empty:#DFC490;--xp:#B45309;--xp-light:#FEF3C7;--accent-raw:146,64,14;}
  body.ct-gold.dark{--paper:#1A1200;--card:#261A00;--line:#3A2800;--done:#FCD34D;--box-empty:#4A3600;--xp:#F59E0B;--xp-light:#2A1E00;}
  body.ct-slate{--paper:#F1F5F9;--card:#FFFFFF;--line:#DCE4EE;--done:#334155;--box-empty:#A0B0C8;--xp:#475569;--xp-light:#E2E8F0;--accent-raw:51,65,85;}
  body.ct-slate.dark{--paper:#0D1117;--card:#161B22;--line:#21262D;--done:#94A3B8;--box-empty:#2D3748;--xp:#A0AEC0;--xp-light:#1A2035;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.45;transition:background .25s,color .25s;}

  /* ── Auth ── */
  #authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);}
  .auth-wrap{width:100%;max-width:400px;}
  .auth-brand{text-align:center;margin-bottom:32px;}
  .auth-brand .lock{font-size:48px;display:block;margin-bottom:10px;}
  .auth-brand h1{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .auth-brand p{font-size:14px;color:var(--muted);margin-top:4px;}
  .auth-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 24px;}
  .auth-tabs{display:flex;gap:4px;background:var(--paper);border-radius:10px;padding:4px;margin-bottom:22px;}
  .auth-tab{flex:1;font-family:inherit;font-size:14px;font-weight:600;border:none;background:none;
    color:var(--muted);border-radius:8px;padding:9px;cursor:pointer;transition:all .15s;}
  .auth-tab.active{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  .auth-field{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;
    border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);
    margin-bottom:10px;outline:none;transition:border-color .15s;}
  .auth-field:focus{border-color:var(--done);}
  .auth-error{font-size:13px;color:#e05252;font-weight:600;min-height:18px;margin-bottom:8px;}
  .auth-submit{width:100%;font-family:inherit;font-size:15px;font-weight:700;
    color:var(--btn-text);background:var(--btn-bg);border:none;border-radius:10px;
    padding:13px;cursor:pointer;transition:opacity .15s;margin-bottom:12px;}
  .auth-submit:hover{opacity:.85;}
  .auth-divider{text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px;position:relative;}
  .auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--line);}
  .auth-divider::before{left:0;}.auth-divider::after{right:0;}
  .auth-google{width:100%;font-family:inherit;font-size:14px;font-weight:600;
    color:var(--ink);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:12px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:8px;transition:background .15s;}
  .auth-google:hover{background:var(--paper);}
  .auth-google svg{flex-shrink:0;}

  /* ── Main App ── */
  #mainApp{padding:18px 18px 60px;max-width:1160px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .top-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .theme-btn,.signout-btn,.settings-btn{font-family:inherit;font-size:13px;font-weight:600;
    color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:6px 12px;cursor:pointer;}
  .signout-btn,.settings-btn{color:var(--muted);}
  .user-chip{font-size:12px;font-weight:600;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header{margin-bottom:14px;}
  .header-top-row{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;}
  .header-count{flex:0 0 auto;}
  .count-wrap{display:flex;align-items:baseline;gap:10px;margin-top:4px;}
  .count{font-size:54px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .count-label{font-size:14px;color:var(--muted);font-weight:500;}
  .header-xp{flex:1;min-width:200px;padding-top:6px;}
  .xp-level-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .xp-badge{font-size:13px;font-weight:800;color:#fff;background:var(--xp);border-radius:99px;padding:4px 11px;}
  .xp-name{font-size:14px;font-weight:700;}
  .xp-total{font-size:12px;color:var(--muted);margin-left:auto;}
  .xp-track{height:10px;background:var(--xp-light);border-radius:99px;overflow:hidden;}
  .xp-fill{height:100%;background:var(--xp);border-radius:99px;transition:width .4s;}
  .xp-sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .progress-track{height:8px;background:var(--line);border-radius:99px;margin-top:14px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--done);width:0;transition:width .35s;}
  .progress-text{font-size:12px;color:var(--muted);margin-top:6px;}
  .nav{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .nav button{flex:0 0 auto;font-size:18px;font-weight:700;width:42px;height:42px;border-radius:11px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;}
  .nav button:disabled{opacity:.3;cursor:default;}
  .nav-mid{flex:1;text-align:center;}
  .nav-day{font-size:15px;font-weight:700;}
  .nav-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .timers{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .timer-box{flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;}
  .timer-box .tb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
  .timer-box .tb-val{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:3px;font-variant-numeric:tabular-nums;}
  .timer-box .tb-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  /* Grid */
  .page-grid{display:grid;grid-template-columns:1fr;gap:0;margin-top:0;}
  .pg-col{display:flex;flex-direction:column;}
  @media(min-width:768px){
    .page-grid{grid-template-columns:1fr 1fr;gap:14px;align-items:start;margin-top:14px;}
    .pg-full{grid-column:1/-1;}
    .pg-col .card{margin-top:14px;} .pg-col .card:first-child{margin-top:0;}
    .pg-full .card{margin-top:0;}
  }
  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:14px;}
  @media(min-width:768px){.page-grid .card{margin-top:0;}}
  .card-hd{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;
    font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;
    border-bottom:1px solid var(--line);transition:background .1s;}
  .card-hd:hover{background:var(--paper);}
  .card-hd .hd-arrow{margin-left:auto;font-size:11px;transition:transform .2s;color:var(--muted);}
  .card-hd.open .hd-arrow{transform:rotate(180deg);}
  .card-hd .hd-badge{margin-left:6px;color:var(--done);letter-spacing:0;font-size:12px;font-weight:700;}
  .card-body{padding:16px;}
  .card-body.hidden{display:none;}
  /* Items */
  .item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--line);cursor:pointer;}
  .item:first-of-type{border-top:none;}
  .box{flex:0 0 22px;height:22px;width:22px;border:2px solid var(--box-empty);border-radius:6px;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .box svg{width:13px;height:13px;opacity:0;transform:scale(.6);transition:all .15s;}
  .item.done .box{background:var(--done);border-color:var(--done);}
  .item.done .box svg{opacity:1;transform:scale(1);}
  .item-text{flex:1;} .item-text .t{font-size:15px;font-weight:600;}
  .item-text .s{font-size:13px;color:var(--muted);margin-top:1px;}
  .item.done .item-text .t{text-decoration:line-through;color:var(--muted);}
  /* Segments */
  .seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:99px;padding:8px 13px;cursor:pointer;transition:all .15s;}
  .seg button.active{background:var(--btn-bg);color:var(--btn-text);border-color:var(--btn-bg);}
  .seg-hint{font-size:12px;color:var(--muted);margin:2px 0 14px;}
  /* Photos */
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cmp-cell{display:flex;flex-direction:column;}
  .cmp-img{aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:var(--paper);
    border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;}
  .cmp-img img{width:100%;height:100%;object-fit:cover;}
  .cmp-img .ph{font-size:12px;color:var(--muted);text-align:center;padding:8px;}
  .cmp-cap{font-size:12px;font-weight:700;margin-top:6px;text-align:center;}
  .cmp-cap span{display:block;font-weight:500;color:var(--muted);font-size:11px;}
  .cmp-cap-edit{margin-top:6px;}
  .cmp-cap-edit input{width:100%;font-family:inherit;font-size:12px;font-weight:700;text-align:center;border:none;border-bottom:1px dashed var(--line);background:none;color:var(--ink);padding:3px 4px;outline:none;}
  .cmp-cap-edit input:focus{border-bottom-color:var(--done);}
  .photo-btn-row{display:flex;gap:6px;margin-top:10px;}
  .photo-btn{flex:1;font-family:inherit;font-size:13px;font-weight:700;
    color:var(--btn-text);background:var(--btn-bg);border:none;border-radius:10px;padding:11px;cursor:pointer;}
  /* Plan */
  .plan-today{background:var(--paper);border-radius:10px;padding:14px;margin-bottom:14px;}
  .plan-today .pt-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
  .plan-today .pt-session{font-size:18px;font-weight:800;margin-top:5px;}
  .plan-today .pt-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .pt-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--line);color:var(--muted);}
  .pt-tag.active{background:var(--done);color:#fff;}
  .plan-edit-toggle{font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;
    display:block;width:100%;margin-top:10px;}
  .plan-editor{margin-top:12px;display:none;}
  .plan-editor.open{display:block;}
  .plan-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--line);}
  .plan-row:first-of-type{border-top:none;}
  .plan-dow{font-size:13px;font-weight:700;width:30px;flex-shrink:0;}
  .plan-sel{flex:1;font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);
    border-radius:8px;background:var(--paper);color:var(--ink);cursor:pointer;}
  .plan-abs-btn{font-family:inherit;font-size:12px;font-weight:700;padding:7px 10px;
    border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--muted);
    cursor:pointer;white-space:nowrap;transition:all .15s;}
  .plan-abs-btn.on{background:var(--done);color:#fff;border-color:var(--done);}
  /* Water tracker */
  .water-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .water-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .water-hdr .wh-label{font-size:13px;font-weight:700;}
  .water-hdr .wh-amount{font-size:13px;font-weight:800;color:var(--water);}
  .water-bar-wrap{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:10px;}
  .water-bar{height:100%;background:var(--water);border-radius:99px;transition:width .3s;}
  .water-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .empty-sess-banner{text-align:center;padding:28px 20px;border:2px dashed var(--line);border-radius:14px;margin-bottom:8px;}
  .esb-icon{font-size:36px;margin-bottom:10px;}
  .esb-text{font-size:16px;font-weight:700;margin-bottom:6px;}
  .esb-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px;}
  .esb-btn{font-family:inherit;font-size:14px;font-weight:700;padding:10px 22px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:10px;cursor:pointer;}
  .esb-btn:hover{opacity:.85;}
  .water-btn{font-family:inherit;font-size:12px;font-weight:700;padding:7px 11px;
    border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);cursor:pointer;}
  .water-btn:hover{background:var(--line);}
  .water-reset{font-family:inherit;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;margin-left:auto;}
  /* Weight */
  .w-start{background:var(--paper);border-radius:12px;padding:12px;margin-bottom:14px;}
  .w-start-hdr{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
  .w-start-row{display:flex;gap:6px;align-items:center;}
  .w-start-row input[type="date"],.w-start-row input[type="number"]{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);outline:none;min-width:0;}
  .w-start-row input[type="date"]{flex:1.4;}
  .w-start-row input[type="number"]{flex:1;width:72px;}
  .w-start-row button{font-family:inherit;font-size:13px;font-weight:700;color:var(--btn-text);background:var(--btn-bg);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;white-space:nowrap;}
  .w-start-set{font-size:12px;color:var(--done);font-weight:600;margin-top:6px;}
  .w-divider{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 10px;}
  .w-entry{display:flex;gap:8px;margin-bottom:14px;}
  .w-entry input{flex:1;font-family:inherit;font-size:16px;font-weight:600;padding:10px 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);}
  .w-entry button{font-family:inherit;font-size:14px;font-weight:700;color:var(--btn-text);background:var(--btn-bg);
    border:none;border-radius:10px;padding:10px 16px;cursor:pointer;}
  .w-stats{display:flex;gap:10px;margin-bottom:14px;}
  .w-stat{flex:1;background:var(--paper);border-radius:10px;padding:10px;text-align:center;}
  .w-stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .w-stat .v{font-size:18px;font-weight:800;margin-top:3px;}
  .w-stat .v.down{color:var(--done);} .w-stat .v.up{color:#e05252;}
  .w-chart{width:100%;overflow-x:auto;margin-bottom:8px;}
  .w-empty{font-size:13px;color:var(--muted);}
  .w-diff{font-size:13px;padding:8px 0 0;border-top:1px solid var(--line);}
  .w-diff .label{color:var(--muted);} .w-diff .val{font-weight:700;margin-left:6px;}
  .w-diff .neg{color:var(--done);} .w-diff .pos{color:#e05252;}
  /* Week */
  .week{display:flex;gap:6px;justify-content:space-between;margin-top:4px;}
  .day-cell{flex:1;text-align:center;cursor:pointer;}
  .day-cell .dl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .day-cell .dn{font-size:10px;color:var(--muted);margin-top:1px;}
  .day-cell .dot{width:26px;height:26px;border-radius:50%;margin:5px auto 0;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);}
  .day-cell.full .dot{background:var(--done);border-color:var(--done);color:#fff;}
  .day-cell.part .dot{border-color:var(--done);color:var(--done);}
  .day-cell.is-view .dl{color:var(--ink);font-weight:800;} .day-cell.is-view .dot{box-shadow:0 0 0 2px var(--ink);}
  /* Food */
  .food-label{font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  textarea{width:100%;font-family:inherit;font-size:14px;line-height:1.5;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:10px;padding:11px;min-height:80px;resize:vertical;}
  /* XP */
  .xp-toast{position:fixed;bottom:24px;right:24px;background:var(--xp);color:#fff;
    border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:8000;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .xp-toast.out{animation:toastOut .3s ease forwards;}
  @keyframes toastOut{to{transform:translateY(20px);opacity:0;}}
  /* Celebration */
  #celebCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;}
  .celeb-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.45);z-index:9999;padding:20px;}
  .celeb-box{background:var(--card);border-radius:20px;padding:32px 28px;text-align:center;
    max-width:320px;width:100%;box-shadow:0 24px 72px rgba(0,0,0,.35);animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .celeb-box .ce-emoji{font-size:52px;display:block;margin-bottom:12px;}
  .celeb-box h3{font-size:24px;font-weight:800;margin-bottom:8px;}
  .celeb-box p{font-size:14px;color:var(--muted);line-height:1.55;}
  .celeb-box .xp-earned{display:inline-block;margin-top:12px;font-size:15px;font-weight:800;
    color:var(--xp);background:var(--xp-light);border-radius:99px;padding:6px 16px;}
  .celeb-box button{margin-top:16px;font-family:inherit;font-size:15px;font-weight:700;

async function save(k,v){if(k.startsWith('photo:')){try{await idbSet(KEY+k,JSON.stringify(v));}catch(e){}return;}if(!_cache)_cache={};_cache[k]=v;setSyncStatus('loading');try{await setDoc(DATA_DOC,{[k]:v},{merge:true});setSyncStatus('synced');}catch(e){setSyncStatus('offline');}}

// --- XP ---
function getLevelInfo(xp){let lvl=0;for(let i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i].min)lvl=i;else break;}const cur=LEVELS[lvl],next=LEVELS[lvl+1]||null;return{level:lvl+1,name:cur.name,nextName:next?next.name:null,nextMin:next?next.min:null,curMin:cur.min,xp,progress:next?(xp-cur.min)/(next.min-cur.min):1};}
function macroItemsFromGoals(){return [{id:"mac_cals",t:`Calories ${macroGoals.calories.toLocaleString()} kcal`,s:"daily target"},{id:"mac_protein",t:`Protein ${macroGoals.protein}g`,s:""},{id:"mac_fat",t:`Fat ${macroGoals.fat}g`,s:""},{id:"mac_carbs",t:`Carbs ${macroGoals.carbs}g`,s:""}];}
function calcDayXP(state){
  if(!state||!state.checked)return 0;const ch=state.checked;
  const sess=sessById(state.session);
  const allIds=[...DAILY.map(d=>d.id),...MACRO_IDS,...(sess?sess.items.map(i=>i.id):[]),...customAbs.map(a=>a.id)];
  let xp=allIds.filter(id=>ch[id]).length*XP_PER_ITEM;
  const dailyDone=DAILY.every(d=>ch[d.id]);
  const macroDone=MACRO_IDS.every(id=>ch[id]);
  const gymDone=sess&&sess.items.every(i=>ch[i.id]);
  const absDone=customAbs.every(a=>ch[a.id]);
  const fullDone=dailyDone&&macroDone&&(sess?gymDone:true)&&absDone;
  if(dailyDone)xp+=XP_BONUS_DAILY;if(gymDone)xp+=XP_BONUS_GYM;if(absDone)xp+=XP_BONUS_ABS;if(fullDone)xp+=XP_BONUS_FULL_DAY;
  return xp;
}
function updateXP(oldDayXP){const newDayXP=calcDayXP(dayState);xpData.total=Math.max(0,(xpData.total||0)-oldDayXP+newDayXP);xpData.days[viewKey]={xp:newDayXP};save("xpData",xpData);return{gained:newDayXP-oldDayXP};}
function renderXPPanel(){const info=getLevelInfo(xpData.total);document.getElementById("xpBadge").textContent="Lv."+info.level;document.getElementById("xpName").textContent=info.name;document.getElementById("xpTotal").textContent=info.xp.toLocaleString()+" XP";document.getElementById("xpFill").style.width=(info.progress*100).toFixed(1)+"%";document.getElementById("xpSub").textContent=info.nextMin?(info.xp-info.curMin)+" / "+(info.nextMin-info.curMin)+" XP → "+info.nextName:"MAX LEVEL — Legend status achieved";}
function showXPToast(g){if(g<=0)return;const t=document.createElement("div");t.className="xp-toast";t.textContent="+"+g+" XP";document.body.appendChild(t);setTimeout(()=>{t.classList.add("out");setTimeout(()=>t.remove(),350);},2200);}
function showLevelUpPopup(info){const ov=document.createElement("div");ov.className="celeb-overlay";ov.innerHTML=`<div class="level-up-box"><span class="ce-emoji">⚡</span><h3>Level ${info.level}!</h3><p>${info.name}</p><button id="lvlClose">Keep going →</button></div>`;document.body.appendChild(ov);ov.querySelector("#lvlClose").addEventListener("click",()=>ov.remove());ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});}

// --- Progress ---
function barTotal(){const sess=sessById(dayState.session);return DAILY.length+MACRO_IDS.length+(sess?sess.items.length:0);}
function barDone(){const sess=sessById(dayState.session);let ids=[...DAILY.map(d=>d.id),...MACRO_IDS,...(sess?sess.items.map(i=>i.id):[])];return ids.filter(id=>dayState.checked[id]).length;}

function refreshPlanToday(){
  const tp=weeklyPlan[viewDate.getDay()]||{session:"rest",abs:false};
  const box=document.querySelector(".plan-today");if(!box)return;
  const s=sessById(tp.session);
  box.querySelector(".pt-session").textContent=s?s.name:'Rest';
  box.querySelectorAll(".pt-tag").forEach((el,i)=>{
    if(i<customSessions.length)el.classList.toggle("active",customSessions[i].id===(tp.session||"rest"));
    else el.classList.toggle("active",!!tp.abs);
  });
}
function itemHtml(it){const on=!!dayState.checked[it.id];return `<div class="item ${on?'done':''}" data-id="${it.id}"><div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="item-text"><div class="t">${it.t}</div>${it.s?`<div class="s">${it.s}</div>`:''}</div></div>`;}

const DAY1_PHOTO_KEY="__day1__";
async function ensurePhoto(k){if(photoCache[k]!==undefined)return;const r=await load("photo:"+k);photoCache[k]=r||null;}

function resizeAndSave(file,key,onDone){const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const max=800;let w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);const data=cv.toDataURL("image/jpeg",0.7);photoCache[key]=data;save("photo:"+key,data);onDone();};img.src=e.target.result;};reader.readAsDataURL(file);}
function handlePhoto1(file){resizeAndSave(file,DAY1_PHOTO_KEY,renderPhotos);}
function handlePhoto2(file){resizeAndSave(file,viewKey,renderPhotos);}

function buildWeightChart(entries){const W=300,H=140,PAD={t:18,r:14,b:28,l:44};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;const vals=entries.map(e=>e[1]);const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const xOf=i=>PAD.l+(entries.length<2?cw/2:(i/(entries.length-1))*cw);const yOf=v=>PAD.t+ch-((v-mn)/rng)*ch;let yAxis='';for(let i=0;i<=3;i++){const v=mn+(rng*i/3),y=yOf(v);yAxis+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${PAD.l+cw}" y2="${y.toFixed(1)}" stroke="currentColor" stroke-width=".5" opacity=".12"/><text x="${PAD.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9.5" fill="currentColor" opacity=".55">${v.toFixed(1)}</text>`;}let xAxis='';const xi=new Set([0]);if(entries.length>1)xi.add(entries.length-1);if(entries.length>2)xi.add(Math.floor((entries.length-1)/2));xi.forEach(i=>{const d=new Date(entries[i][0]+'T00:00:00');xAxis+=`<text x="${xOf(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9.5" fill="currentColor" opacity=".55">${d.toLocaleDateString(undefined,{day:'numeric',month:'short'})}</text>`;});const linePts=entries.map((e,i)=>`${xOf(i).toFixed(1)},${yOf(e[1]).toFixed(1)}`).join(' ');const last=entries.length-1;const area=entries.length>=2?`<polygon points="${xOf(0).toFixed(1)},${(PAD.t+ch).toFixed(1)} ${linePts} ${xOf(last).toFixed(1)},${(PAD.t+ch).toFixed(1)}" fill="#2E7D54" opacity=".1"/>`:'';const line=entries.length>=2?`<polyline points="${linePts}" fill="none" stroke="#2E7D54" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:'';let circles='';entries.forEach((e,i)=>{const x=xOf(i),y=yOf(e[1]),here=e[0]===viewKey;circles+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${here?5:3.5}" fill="${here?'#2E7D54':'var(--card)'}" stroke="#2E7D54" stroke-width="1.8"/>`;if(here||entries.length<=6)circles+=`<text x="${x.toFixed(1)}" y="${(y-10).toFixed(1)}" text-anchor="middle" font-size="9" fill="currentColor" opacity="${here?.9:.55}" font-weight="${here?700:400}">${e[1]}</text>`;});return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;color:var(--ink)">${yAxis}${area}${line}${circles}${xAxis}</svg>`;}
function renderWeight(){const body=document.getElementById("wBody");if(!body)return;
  // Build entries: startWeight (if set) + daily logs, deduplicated by date (daily log wins if same date)
  const daily=Object.entries(weights).sort((a,b)=>a[0]<b[0]?-1:1);
  let entries=[...daily];
  if(startWeight.value!=null){
    const sd=startWeight.date||'0000-00-00';
    if(!weights[sd])entries=[...[[sd,startWeight.value]],...daily].sort((a,b)=>a[0]<b[0]?-1:1);
  }
  if(!entries.length){body.innerHTML='<div class="w-empty">Log your weight above or set a starting weight to begin tracking your trend.</div>';return;}
  const first=entries[0][1],latest=entries[entries.length-1][1],diff=+(latest-first).toFixed(1);
  const cls=diff<=0?'down':'up',sign=diff>0?'+':'';
  let html=`<div class="w-stats"><div class="w-stat"><div class="l">Start</div><div class="v">${first} kg</div></div><div class="w-stat"><div class="l">Latest</div><div class="v">${latest} kg</div></div><div class="w-stat"><div class="l">Change</div><div class="v ${cls}">${sign}${diff} kg</div></div></div>`;
  if(entries.length>=2){html+=`<div class="w-chart">${buildWeightChart(entries)}</div>`;const prev=entries[entries.length-2],curr=entries[entries.length-1];const d=+(curr[1]-prev[1]).toFixed(2),s2=d>0?'+':'',c2=d<=0?'neg':'pos';const days=Math.round((new Date(curr[0])-new Date(prev[0]+'T00:00:00'))/86400000);html+=`<div class="w-diff"><span class="label">vs ${days===1?'yesterday':`${days} days ago`} (${shortD(new Date(prev[0]+'T00:00:00'))})</span><span class="val ${c2}">${s2}${d} kg</span></div>`;}
  else html+='<div class="w-empty" style="margin-bottom:10px">One more entry and your chart appears.</div>';
  body.innerHTML=html;
}
function renderQuote(){const el=document.getElementById("quoteCard");if(!el)return;const seed=realToday.getFullYear()*10000+((realToday.getMonth()+1)*100)+realToday.getDate();const q=QUOTES[seed%QUOTES.length];el.innerHTML=`<div class="qc-label">Quote of the day</div><div class="qc-text">"${q}"</div><div class="qc-warning">⚠️ Don't let future-you down. Every day you skip makes the next one harder — stay locked in or live with the regret.</div>`;}
function pad2(n){return String(Math.floor(n)).padStart(2,'0');}
function tickTimers(){const now=new Date();const mid=new Date(now);mid.setHours(24,0,0,0);let r=Math.max(0,mid-now);const dh=Math.floor(r/3600000);r-=dh*3600000;const dm=Math.floor(r/60000);r-=dm*60000;const ds=Math.floor(r/1000);const td=document.getElementById("timerDay");if(td)td.textContent=pad2(dh)+':'+pad2(dm)+':'+pad2(ds);let r2=Math.max(0,TARGET-now);const tdays=Math.floor(r2/86400000);r2-=tdays*86400000;const th=Math.floor(r2/3600000);r2-=th*3600000;const tm=Math.floor(r2/60000);r2-=tm*60000;const ts=Math.floor(r2/1000);const tt=document.getElementById("timerTarget");if(tt)tt.textContent=tdays+'d '+pad2(th)+':'+pad2(tm)+':'+pad2(ts);}
async function renderWeek(){const wk=document.getElementById("week");if(!wk)return;const wkStart=new Date(START);wkStart.setDate(START.getDate()+weekIndexOf(viewDate)*7);const labels=["S","M","T","W","T","F","S"];let html="",absCount=0;for(let i=0;i<7;i++){const d=new Date(wkStart);d.setDate(wkStart.getDate()+i);const k=dkey(d);let cls="day-cell",mark="";if(k===viewKey)cls+=" is-view";const data=k===viewKey?dayState:await load(k);if(data&&data.checked){const dc=DAILY.filter(x=>data.checked[x.id]).length;if(dc>=DAILY.length){cls+=" full";mark="✓";}else if(dc>0){cls+=" part";mark=dc;}if(customAbs.some(a=>data.checked[a.id]))absCount++;}html+=`<div class="${cls}" data-key="${k}"><div class="dl">${labels[d.getDay()]}</div><div class="dn">${d.getDate()}</div><div class="dot">${mark}</div></div>`;}wk.innerHTML=html;wk.querySelectorAll(".day-cell").forEach(el=>el.addEventListener("click",()=>jumpTo(el.dataset.key)));const hd=document.querySelector('[data-card="week"]');if(hd){const b=hd.querySelector(".hd-badge");if(b)b.textContent="abs "+absCount+"/4";}}

// --- Celebration ---
function checkCelebrate(){const total=barTotal(),done=barDone();if(total>0&&done===total&&!celebrated[viewKey]){celebrated[viewKey]=true;triggerCelebration(calcDayXP(dayState));}}
function triggerCelebration(earnedXP){launchConfetti();const pd=progDayOf(viewDate);const ov=document.createElement("div");ov.className="celeb-overlay";ov.innerHTML=`<div class="celeb-box"><span class="ce-emoji">🎉</span><h3>${pd>=1?'Day '+pd+' complete!':'Day complete!'}</h3><p>Every single box ticked.<br>That's what locked in looks like.</p><div class="xp-earned">+${earnedXP} XP today</div><button id="celebClose">Let's go →</button></div>`;document.body.appendChild(ov);ov.querySelector("#celebClose").addEventListener("click",()=>ov.remove());ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});}
function launchConfetti(){const canvas=document.createElement("canvas");canvas.id="celebCanvas";document.body.appendChild(canvas);canvas.width=window.innerWidth;canvas.height=window.innerHeight;const ctx=canvas.getContext("2d");const colors=["#2E7D54","#4CAF7D","#FFD700","#FF6B6B","#4ECDC4","#A78BFA","#F59E0B"];const ps=[];for(let i=0;i<150;i++)ps.push({x:Math.random()*canvas.width,y:-10-Math.random()*canvas.height*.5,w:5+Math.random()*8,h:3+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-.5)*4,vy:2+Math.random()*5,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.25,opacity:1});let frame=0;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;p.vy+=.06;if(frame>80)p.opacity=Math.max(0,p.opacity-.012);if(p.y<canvas.height+30&&p.opacity>0)alive=true;ctx.save();ctx.globalAlpha=p.opacity;ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});frame++;if(alive)requestAnimationFrame(draw);else canvas.remove();}requestAnimationFrame(draw);}

// --- Actions ---
function toggle(id){const prevXP=(xpData.days[viewKey]||{xp:0}).xp;const prevLvl=getLevelInfo(xpData.total).level;dayState.checked[id]=!dayState.checked[id];persistDay();const diff=updateXP(prevXP);const newLvl=getLevelInfo(xpData.total).level;if(diff.gained>0)showXPToast(diff.gained);if(newLvl>prevLvl)showLevelUpPopup(getLevelInfo(xpData.total));render();}
function pickSession(k){if(dayState.session!==k){const prevXP=(xpData.days[viewKey]||{xp:0}).xp;const keep={};DAILY.forEach(d=>{if(dayState.checked[d.id])keep[d.id]=true;});MACRO_IDS.forEach(id=>{if(dayState.checked[id])keep[id]=true;});customAbs.forEach(a=>{if(dayState.checked[a.id])keep[a.id]=true;});const s=sessById(k);if(s)s.items.forEach(it=>{if(dayState.checked[it.id])keep[it.id]=true;});dayState.checked=keep;dayState.session=k;updateXP(prevXP);}persistDay();render();}
function resetDay(){const prevXP=(xpData.days[viewKey]||{xp:0}).xp;celebrated[viewKey]=false;dayState={session:dayState.session,checked:{},food:dayState.food,water:0};persistDay();updateXP(prevXP);render();}
function persistDay(){save(viewKey,dayState);}
function logWeight(){const inp=document.getElementById("wInput");const v=parseFloat(inp.value);if(isNaN(v)||v<=0)return;weights[viewKey]=Math.round(v*10)/10;save("weights",weights);renderWeight();}
async function changeDay(delta){const d=new Date(viewDate);d.setDate(d.getDate()+delta);if(midnight(d)<midnight(earliest)||midnight(d)>midnight(realToday))return;viewDate=d;viewKey=dkey(viewDate);await loadDay();render();}
async function jumpTo(k){if(k<dkey(earliest)||k>realKey)return;viewDate=new Date(k+"T00:00:00");viewKey=k;await loadDay();render();}
async function loadDay(){const s=await load(viewKey);dayState=s||{session:null,checked:{},food:"",water:0};if(dayState.food===undefined)dayState.food="";if(dayState.water===undefined)dayState.water=0;}

document.getElementById("prevDay").addEventListener("click",()=>changeDay(-1));
document.getElementById("nextDay").addEventListener("click",()=>changeDay(1));
document.getElementById("photoInput1").addEventListener("change",e=>{if(e.target.files&&e.target.files[0])handlePhoto1(e.target.files[0]);e.target.value="";});
document.getElementById("photoInput2").addEventListener("change",e=>{if(e.target.files&&e.target.files[0])handlePhoto2(e.target.files[0]);e.target.value="";});
const themeBtn=document.getElementById("themeBtn");

// ── Settings Modal ──

function openSettings(){
  document.getElementById("settingsModal").classList.remove("hidden");
  renderSettings();
}
function closeSettings(){
  document.getElementById("settingsModal").classList.add("hidden");
  editingSession=null;editingAbs=false;
}
document.getElementById("settingsBtn").addEventListener("click",openSettings);
document.getElementById("settingsClose").addEventListener("click",closeSettings);
document.getElementById("settingsModal").addEventListener("click",e=>{if(e.target===document.getElementById("settingsModal"))closeSettings();});

function renderSettings(){
  const body=document.getElementById("settingsBody");

  // Build session list HTML
  const sessListHtml=customSessions.map(s=>`
    <div class="sess-item" data-sid="${s.id}">
      <div class="sess-name-col">
        <div class="sess-title">${s.name}</div>
        <div class="sess-meta">${s.items.length} exercise${s.items.length!==1?'s':''}</div>
      </div>
      <button class="s-btn primary edit-sess-btn" data-sid="${s.id}">Edit</button>
      <button class="s-btn danger del-sess-btn" data-sid="${s.id}">Delete</button>
    </div>
    ${editingSession&&editingSession.id===s.id?renderSessionEditor():''}
  `).join('');
  const isNewSess=editingSession&&!customSessions.find(s=>s.id===editingSession.id);
  const newSessEditorHtml=isNewSess?renderSessionEditor():'';

  // Abs list
  const absListHtml=customAbs.map((a,i)=>`
    <div class="ex-row" data-ai="${i}">
      <input class="ex-name abs-name" data-ai="${i}" value="${esc(a.name)}" placeholder="Exercise name">
      <input class="ex-small abs-sets" data-ai="${i}" value="${esc(a.sets)}" placeholder="Sets" title="Sets">
      <input class="ex-small abs-reps" data-ai="${i}" value="${esc(a.reps)}" placeholder="Reps" title="Reps">
      <button class="ex-del-btn del-abs-btn" data-ai="${i}" title="Remove">×</button>
    </div>
  `).join('');

  body.innerHTML=`
    <div class="s-section">
      <h3>Appearance</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Choose a colour theme for the page.</p>
      <div class="theme-swatches">
        ${COLOR_THEMES.map(t=>`<button class="theme-swatch${colorTheme===t.id?' active':''}" data-tid="${t.id}"><div class="sw-dot" style="background:${t.dot}"></div><div class="sw-label">${t.label}</div></button>`).join('')}
      </div>
    </div>

    <div class="s-section">
      <h3>Workout Sessions</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Create your own sessions and assign them to days in the weekly plan.</p>
      ${sessListHtml}
      ${newSessEditorHtml}
      ${!isNewSess?'<button class="new-item-btn" id="newSessBtn">+ New Session</button>':''}
    </div>

    <div class="s-section">
      <h3>Abs Exercises</h3>
      <div class="ex-col-hdr">
        <span class="ex-name" style="flex:1;padding:0 10px">Exercise</span>
        <span class="ex-small" style="width:62px;text-align:center">Sets</span>
        <span class="ex-small" style="width:62px;text-align:center">Reps</span>
        <span style="width:28px"></span>
      </div>
      <div id="absExList">${absListHtml}</div>
      <button class="add-ex-btn" id="addAbsBtn">+ Add exercise</button>
      <div class="editor-actions" style="margin-top:14px">
        <button class="e-save" id="saveAbsBtn">Save Abs</button>
      </div>
    </div>

    <div class="s-section">
      <h3>Nutrition Goals</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Set your daily targets. These appear as tickable items in the Nutrition card.</p>
      <div class="macro-grid">
        <div class="macro-field"><label>Calories</label><input type="number" id="mg_cals" value="${macroGoals.calories}"><div class="unit">kcal / day</div></div>
        <div class="macro-field"><label>Protein</label><input type="number" id="mg_protein" value="${macroGoals.protein}"><div class="unit">grams / day</div></div>
        <div class="macro-field"><label>Fat</label><input type="number" id="mg_fat" value="${macroGoals.fat}"><div class="unit">grams / day</div></div>
        <div class="macro-field"><label>Carbs</label><input type="number" id="mg_carbs" value="${macroGoals.carbs}"><div class="unit">grams / day</div></div>
        <div class="macro-field"><label>Water Goal</label><input type="number" id="mg_water" value="${macroGoals.waterMl}"><div class="unit">ml / day</div></div>
      </div>
      <button class="s-save-btn" id="saveMacrosBtn">Save Nutrition Goals</button>
    </div>
  `;

  // Colour theme swatches
  body.querySelectorAll(".theme-swatch").forEach(btn=>btn.addEventListener("click",()=>{
    applyColorTheme(btn.dataset.tid);
    save("colorTheme",colorTheme);
    body.querySelectorAll(".theme-swatch").forEach(b=>b.classList.toggle("active",b.dataset.tid===colorTheme));
  }));

  // Session edit/delete
  body.querySelectorAll(".edit-sess-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const sid=btn.dataset.sid;
    const s=sessById(sid);if(!s)return;
    editingSession=JSON.parse(JSON.stringify(s)); // deep copy
    renderSettings();
  }));
  body.querySelectorAll(".del-sess-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const sid=btn.dataset.sid;
    if(!confirm(`Delete session "${sessById(sid)?.name||sid}"?`))return;
    customSessions=customSessions.filter(s=>s.id!==sid);
    save("customSessions",customSessions);render();renderSettings();
  }));
  body.getElementById && null;

  // New session
  body.querySelector("#newSessBtn")?.addEventListener("click",()=>{
    editingSession={id:uid(),name:"New Session",items:[]};
    renderSettings();
  });

  // Session editor events (if open)
  if(editingSession){
    body.querySelector("#edSessName")?.addEventListener("input",e=>editingSession.name=e.target.value);
    body.querySelectorAll(".ed-ex-name").forEach(el=>el.addEventListener("input",e=>{editingSession.items[+el.dataset.ei].name=e.target.value;}));
    body.querySelectorAll(".ed-ex-sets").forEach(el=>el.addEventListener("input",e=>{editingSession.items[+el.dataset.ei].sets=e.target.value;}));
    body.querySelectorAll(".ed-ex-reps").forEach(el=>el.addEventListener("input",e=>{editingSession.items[+el.dataset.ei].reps=e.target.value;}));
    body.querySelectorAll(".ed-del-ex").forEach(btn=>btn.addEventListener("click",()=>{editingSession.items.splice(+btn.dataset.ei,1);renderSettings();}));
    body.querySelector("#addEdEx")?.addEventListener("click",()=>{editingSession.items.push({id:uid(),name:"",sets:"3",reps:""});renderSettings();setTimeout(()=>{const inputs=body.querySelectorAll(".ed-ex-name");inputs[inputs.length-1]?.focus();},50);});
    body.querySelector("#saveEdSess")?.addEventListener("click",()=>{
      if(!editingSession.name.trim()){alert("Session needs a name.");return;}
      const idx=customSessions.findIndex(s=>s.id===editingSession.id);
      if(idx>=0)customSessions[idx]=editingSession;else customSessions.push(editingSession);
      save("customSessions",customSessions);editingSession=null;render();renderSettings();
    });
    body.querySelector("#cancelEdSess")?.addEventListener("click",()=>{editingSession=null;renderSettings();});
  }

  // Abs events
  body.querySelectorAll(".abs-name").forEach(el=>el.addEventListener("input",e=>{customAbs[+el.dataset.ai].name=e.target.value;}));
  body.querySelectorAll(".abs-sets").forEach(el=>el.addEventListener("input",e=>{customAbs[+el.dataset.ai].sets=e.target.value;}));
  body.querySelectorAll(".abs-reps").forEach(el=>el.addEventListener("input",e=>{customAbs[+el.dataset.ai].reps=e.target.value;}));
  body.querySelectorAll(".del-abs-btn").forEach(btn=>btn.addEventListener("click",()=>{customAbs.splice(+btn.dataset.ai,1);renderSettings();}));
  body.querySelector("#addAbsBtn").addEventListener("click",()=>{customAbs.push({id:uid(),name:"",sets:"3",reps:"",note:""});renderSettings();setTimeout(()=>{const inputs=body.querySelectorAll(".abs-name");inputs[inputs.length-1]?.focus();},50);});

  // Macros
  body.querySelector("#saveMacrosBtn").addEventListener("click",()=>{
    macroGoals.calories=+body.querySelector("#mg_cals").value||2300;
    macroGoals.protein=+body.querySelector("#mg_protein").value||155;
    macroGoals.fat=+body.querySelector("#mg_fat").value||65;

    macroGoals.waterMl=+body.querySelector("#mg_water").value||2500;

  });
}

function renderSessionEditor(){
  if(!editingSession)return'';
  const exRows=editingSession.items.map((ex,i)=>`
    <div class="ex-row">
      <input class="ex-name ed-ex-name" data-ei="${i}" value="${esc(ex.name)}" placeholder="Exercise name">
      <input class="ex-small ed-ex-sets" data-ei="${i}" value="${esc(ex.sets)}" placeholder="Sets" title="Sets">
      <input class="ex-small ed-ex-reps" data-ei="${i}" value="${esc(ex.reps)}" placeholder="Reps" title="Reps">
      <button class="ex-del-btn ed-del-ex" data-ei="${i}" title="Remove">×</button>

  `).join('');
  return `<div class="editor-wrap">
    <div class="e-label">Session name</div>

      <button class="e-cancel" id="cancelEdSess">Cancel</button>

}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showSettingsToast(msg){const t=document.createElement("div");t.className="xp-toast";t.style.background="var(--done)";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.classList.add("out");setTimeout(()=>t.remove(),350);},2000);}

document.getElementById("signOutBtn").addEventListener("click",async()=>{await signOut(auth);_cache=null;DATA_DOC=null;dayState={session:null,checked:{},food:"",water:0};weights={};photoCache={};startWeight={value:null,date:"",label:""};day1PhotoLabel="Before";weeklyPlan=JSON.parse(JSON.stringify(DEFAULT_PLAN));customSessions=[...DEFAULT_SESSIONS];customAbs=[...DEFAULT_ABS];macroGoals={...DEFAULT_MACRO_GOALS};xpData={total:0,days:{}};celebrated={};applyColorTheme("default");document.getElementById("mainApp").style.display="none";document.getElementById("authScreen").style.display="flex";document.getElementById("authEmail").value="";document.getElementById("authPassword").value="";});

// ── Auth State ──
async function migrateOldData(){try{const userSnap=await getDoc(DATA_DOC);if(userSnap.exists()&&Object.keys(userSnap.data()).length>0)return false;const oldSnap=await getDoc(doc(fsdb,'recomp','main'));if(!oldSnap.exists())return false;const oldData=oldSnap.data();await setDoc(DATA_DOC,oldData);_cache={...oldData};return true;}catch(e){return false;}}

onAuthStateChanged(auth,async user=>{
  if(!user){document.getElementById("authScreen").style.display="flex";document.getElementById("mainApp").style.display="none";return;}
  DATA_DOC=doc(fsdb,'users',user.uid,'data','main');_cache=null;
  const chip=document.getElementById("userChip");if(chip)chip.textContent=user.displayName||(user.email?.split('@')[0])||'';
  document.getElementById("authScreen").style.display="none";
  document.getElementById("mainApp").style.display="block";
  document.getElementById("app").innerHTML='<div class="loading">Loading your data…</div>';
  await migrateOldData();
  const t=await load("theme");applyTheme(t==="dark");
  const ct=await load("colorTheme");applyColorTheme(ct||"default");
  const w=await load("weights");weights=w||{};
  const sw=await load("startWeight");if(sw&&sw.value!=null)startWeight=sw;
  const d1l=await load("day1PhotoLabel");if(d1l)day1PhotoLabel=d1l;
  const wp=await load("weeklyPlan");if(wp)weeklyPlan=wp;
  const cs=await load("customSessions");
  if(cs!==null)customSessions=cs;
  else if(Object.keys(_cache||{}).length===0)customSessions=[]; // brand new user — start empty
  const ca=await load("customAbs");if(ca&&ca.length)customAbs=ca;
  const mg=await load("macroGoals");if(mg)macroGoals={...DEFAULT_MACRO_GOALS,...mg};
  const xp=await load("xpData");if(xp)xpData=xp;
  await loadDay();render();
  tickTimers();setInterval(tickTimers,1000);
});
